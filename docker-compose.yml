version: '3.8'

services:
  # Main Application
  nih-skill:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nih-skill-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_DEFAULT_PROVIDER=${NEXT_PUBLIC_DEFAULT_PROVIDER:-openclaw}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
      - NEXT_PUBLIC_DEFAULT_MODEL=${NEXT_PUBLIC_DEFAULT_MODEL:-gpt-5.5} # 2026: Updated from gpt-4o-mini to GPT-5.5 Flagship
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - PDF_PARSE_TIMEOUT=${PDF_PARSE_TIMEOUT:-60000}
      - DOI_RESOLUTION_TIMEOUT=${DOI_RESOLUTION_TIMEOUT:-30000}
      - CHAT_COMPLETION_TIMEOUT=${CHAT_COMPLETION_TIMEOUT:-120000}
      - OPENALEX_EMAIL=${OPENALEX_EMAIL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nih-skill-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nih-skill-network:
    driver: bridge

volumes:
  nih-skill-data:
