<svg xmlns="http://www.w3.org/2000/svg" width="215" height="48" fill="none" viewBox="0 0 215 48">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo Icon -->
  <g transform="translate(24, 24)">
    <rect x="-20" y="-20" width="40" height="40" rx="10" fill="#0a1628"/>
    <path d="M-5.5,-10 Q-7,-7 -5.5,-4 Q-4,-1 -5.5,2 Q-7,5 -5.5,10"
          stroke="url(#logoGrad)" strokeWidth="2" fill="none" strokeLinecap="round"/>
    <path d="M5.5,-10 Q7,-7 5.5,-4 Q4,-1 5.5,2 Q7,5 5.5,10"
          stroke="url(#logoGrad)" strokeWidth="2" fill="none" strokeLinecap="round"/>
    <line x1="-5" y1="-8" x2="5" y2="-8" stroke="#22d3ee" strokeWidth="1.3" strokeLinecap="round"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#22d3ee" strokeWidth="1.3" strokeLinecap="round"/>
    <line x1="-4.5" y1="0" x2="4.5" y2="0" stroke="#10b981" strokeWidth="1.3" strokeLinecap="round"/>
    <line x1="-6" y1="4" x2="6" y2="4" stroke="#10b981" strokeWidth="1.3" strokeLinecap="round"/>
    <circle cx="0" cy="0" r="3" fill="url(#logoGrad)"/>
    <circle cx="0" cy="0" r="1.5" fill="#ffffff"/>
  </g>

  <!-- Text: BME RA -->
  <text x="56" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" letter-spacing="-0.02em" fill="#0a1628">
    BME RA
  </text>

  <!-- Text: Research Accelerator -->
  <text x="56" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.02em">
    Research Accelerator
  </text>
</svg>