<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="40" fill="#0a1628"/>

  <g transform="translate(90, 90)">
    <!-- Outer ring - tech circuit -->
    <circle cx="0" cy="0" r="65" stroke="url(#secondaryGrad)" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="8 4"/>

    <!-- DNA Helix Structure -->
    <g filter="url(#glow)">
      <!-- Left strand -->
      <path d="M-25,-45 Q-35,-30 -25,-15 Q-15,0 -25,15 Q-35,30 -25,45"
            stroke="url(#primaryGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- Right strand -->
      <path d="M25,-45 Q35,-30 25,-15 Q15,0 25,15 Q35,30 25,45"
            stroke="url(#primaryGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- Connection bars (base pairs) -->
      <line x1="-23" y1="-38" x2="23" y2="-38" stroke="url(#secondaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <line x1="-28" y1="-22" x2="28" y2="-22" stroke="url(#secondaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="url(#secondaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <line x1="-28" y1="22" x2="28" y2="22" stroke="url(#secondaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <line x1="-23" y1="38" x2="23" y2="38" stroke="url(#secondaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    </g>

    <!-- Central node/AI core -->
    <circle cx="0" cy="0" r="12" fill="url(#primaryGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="6" fill="#ffffff" opacity="0.9"/>

    <!-- Data nodes on helix -->
    <circle cx="-25" cy="-45" r="4" fill="#22d3ee" opacity="0.8"/>
    <circle cx="25" cy="-45" r="4" fill="#22d3ee" opacity="0.8"/>
    <circle cx="-25" cy="45" r="4" fill="#10b981" opacity="0.8"/>
    <circle cx="25" cy="45" r="4" fill="#10b981" opacity="0.8"/>
  </g>
</svg>